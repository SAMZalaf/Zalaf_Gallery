<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalaf Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap');
        
        :root {
            --emerald: #10b981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
            --dark: #0f172a;
            --card: #1e293b;
        }

        body {
            background: var(--dark);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* تصميم الرأس */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 50px auto;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(16, 185, 129, 0.2);
        }

        h1 { margin: 0; color: var(--emerald); letter-spacing: 2px; text-shadow: 0 0 15px var(--emerald-glow); }
        
        .lang-btn {
            background: transparent;
            border: 1px solid var(--emerald);
            color: var(--emerald);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-btn:hover { background: var(--emerald); color: white; }

        /* الشبكة والبطاقات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--emerald);
            box-shadow: 0 10px 30px -10px var(--emerald-glow);
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
        }

        .content { padding: 20px; }

        .tag {
            background: rgba(16, 185, 129, 0.1);
            color: var(--emerald);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .link-btn {
            display: block;
            text-align: center;
            background: var(--emerald);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ ZALAF</h1>
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">English</button>
    </header>

    <div class="grid" id="projectsGrid">
        <p style="text-align:center; width:100%">جارٍ تحميل المشاريع...</p>
    </div>

    <script>
        let isArabic = true;
        let projectsData = [];

        // جلب البيانات من ملف JSON
        async function loadProjects() {
            try {
                // ملاحظة: نضيف الوقت لتجنب التخزين المؤقت للمتصفح (Cache)
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("لم يتم العثور على ملف data.json");
                projectsData = await response.json();
                renderProjects();
            } catch (error) {
                document.getElementById('projectsGrid').innerHTML = `<p style="color:red">خطأ: تأكد من رفع ملف data.json</p>`;
                console.error(error);
            }
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projectsData.map(p => `
                <div class="card">
                    <img src="${p.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x200?text=Zalaf+Code'">
                    <div class="content">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <span class="tag">${p.type}</span>
                        </div>
                        <h3 style="margin:0 0 10px 0">${p.name}</h3>
                        <p style="color:#cbd5e1; font-size:0.9em; margin-bottom:15px; height: 40px; overflow:hidden;">${p.desc}</p>
                        <a href="${p.link}" target="_blank" class="link-btn">
                            ${isArabic ? 'مشاهدة المشروع' : 'View Project'}
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function toggleLang() {
            isArabic = !isArabic;
            document.getElementById('mainHtml').dir = isArabic ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isArabic ? 'English' : 'عربي';
            renderProjects();
        }

        loadProjects();
    </script>
</body>
</html>
