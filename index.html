<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamad Zalaf - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --emerald: #10b981;
            --emerald-dark: #064e3b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-gray: #cbd5e1;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Top Contact Bar */
        .top-bar {
            background: linear-gradient(90deg, #064e3b, #065f46);
            padding: 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--emerald);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .contact-flex {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }
        .contact-item { margin-left: 15px; color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
        .contact-item:hover { color: var(--emerald); }

        /* Header & Logo */
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 30px;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; border: 2px solid var(--emerald); }
        .brand-name { font-size: 1.8rem; font-weight: 700; color: var(--emerald); margin: 0; line-height: 1; }
        .brand-sub { font-size: 0.9rem; color: var(--text-gray); }

        /* Controls */
        .controls { display: flex; gap: 10px; }
        .btn {
            background: transparent; border: 1px solid var(--emerald); color: var(--emerald);
            padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn:hover, .btn.active { background: var(--emerald); color: white; }

        /* Grid View */
        .grid-view {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px;
        }
        .card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            border: 1px solid #334155; transition: transform 0.3s; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--emerald); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #000; }
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .tech-tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
        .tag { background: rgba(16, 185, 129, 0.15); color: var(--emerald); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
        .date-badge { font-size: 0.75rem; color: #64748b; margin-bottom: 5px; display: block; }
        
        /* Table View */
        .table-responsive { overflow-x: auto; display: none; }
        .projects-table {
            width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden;
        }
        .projects-table th, .projects-table td {
            padding: 15px; text-align: right; border-bottom: 1px solid #334155;
        }
        .projects-table th { background: rgba(16, 185, 129, 0.1); color: var(--emerald); }
        .projects-table tr:hover { background: rgba(255,255,255,0.02); }

        /* Footer */
        footer { text-align: center; margin-top: 50px; color: #64748b; font-size: 0.9rem; border-top: 1px solid #334155; padding-top: 20px; }

        /* Utility */
        .hidden { display: none !important; }
        [dir="ltr"] .contact-item { margin-left: 0; margin-right: 15px; }
        [dir="ltr"] .projects-table th, [dir="ltr"] .projects-table td { text-align: left; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="container contact-flex">
            <div>
                <a href="mailto:MohamadZalaf@outlook.com" class="contact-item"><i class="fas fa-envelope"></i> MohamadZalaf@outlook.com</a>
                <a href="mailto:Mohamadzalaf2017@gmail.com" class="contact-item"><i class="fas fa-envelope"></i> Gmail</a>
                <a href="https://t.me/MohamadZalaf" target="_blank" class="contact-item"><i class="fab fa-telegram"></i> Telegram</a>
            </div>
            <div id="copyrightName">Mohamad Zalaf © 2025</div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo-area">
                <img src="logo.jpg" alt="Zalaf Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/60'">
                <div>
                    <h1 class="brand-name">ZALAF</h1>
                    <span class="brand-sub" id="jobTitle">🧑‍💻 ITE</span>
                </div>
            </div>
            <div class="controls">
                <button class="btn active" id="btnGrid" onclick="switchView('grid')"><i class="fas fa-th-large"></i></button>
                <button class="btn" id="btnTable" onclick="switchView('table')"><i class="fas fa-list"></i></button>
                <button class="btn" onclick="toggleLang()" id="langBtn">عربي</button>
            </div>
        </header>

        <div id="loader" style="text-align: center; padding: 40px;">Loading...</div>

        <div id="gridView" class="grid-view"></div>

        <div id="tableView" class="table-responsive">
            <table class="projects-table">
                <thead>
                    <tr id="tableHeader">
                        <th>المشروع</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                        <th>التقنيات</th>
                        <th>رابط</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <footer>
            <p>Designed & Developed by Mohamad Zalaf © 2025</p>
        </footer>
    </div>

    <script>
        let isArabic = false;
        let currentView = 'grid';
        let projectsData = [];

        // نصوص الواجهة
        const uiText = {
            ar: {
                job: "🧑‍💻 ITE ",
                viewBtn: "معاينة",
                noLink: "لا يوجد رابط",
                status: { completed: "مكتمل", progress: "قيد التطوير" },
                tableHeaders: ["المشروع", "التاريخ", "الحالة", "التقنيات", "الرابط"]
            },
            en: {
                job: "🧑‍💻 ITE",
                viewBtn: "View Project",
                noLink: "No Link",
                status: { completed: "Completed", progress: "In Progress" },
                tableHeaders: ["Project", "Date", "Status", "Tech Stack", "Link"]
            }
        };

        async function loadProjects() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                if (!response.ok) throw new Error("Failed");
                projectsData = await response.json();
                document.getElementById('loader').classList.add('hidden');
                render();
            } catch (error) {
                document.getElementById('loader').innerHTML = "Error loading data.json";
            }
        }

        function switchView(mode) {
            currentView = mode;
            // تحديث الأزرار
            document.getElementById('btnGrid').className = `btn ${mode === 'grid' ? 'active' : ''}`;
            document.getElementById('btnTable').className = `btn ${mode === 'table' ? 'active' : ''}`;
            
            // تحديث العرض
            if(mode === 'grid') {
                document.getElementById('gridView').classList.remove('hidden');
                document.getElementById('tableView').classList.remove('show');
                document.getElementById('tableView').style.display = 'none';
                document.getElementById('gridView').style.display = 'grid';
            } else {
                document.getElementById('gridView').style.display = 'none';
                document.getElementById('tableView').style.display = 'block';
            }
        }

        function toggleLang() {
            isArabic = !isArabic;
            document.documentElement.dir = isArabic ? 'rtl' : 'ltr';
            document.documentElement.lang = isArabic ? 'ar' : 'en';
            document.body.style.fontFamily = isArabic ? "'Cairo', sans-serif" : "'Poppins', sans-serif";
            document.getElementById('langBtn').textContent = isArabic ? "EN" : "عربي";
            render();
        }

        function render() {
            const lang = isArabic ? 'ar' : 'en';
            const text = uiText[lang];
            
            document.getElementById('jobTitle').textContent = text.job;

            // 1. Render Grid
            const gridHTML = projectsData.map(p => {
                const title = isArabic ? p.title_ar : p.title_en;
                const desc = isArabic ? p.desc_ar : p.desc_en;
                const tagsHTML = p.tech.map(t => `<span class="tag">${t}</span>`).join('');
                const linkHTML = p.link ? 
                    `<a href="${p.link}" target="_blank" style="color:var(--emerald); text-decoration:none; font-weight:bold; margin-top:auto;"><i class="fas fa-external-link-alt"></i> ${text.viewBtn}</a>` :
                    `<span style="color:#64748b; margin-top:auto; font-size:0.9em"><i class="fas fa-lock"></i> ${text.noLink}</span>`;
                
                return `
                <div class="card">
                    <img src="${p.img}" class="card-img" onerror="this.src='logo.jpg'">
                    <div class="card-body">
                        <span class="date-badge"><i class="far fa-calendar-alt"></i> ${p.date}</span>
                        <h3 style="margin:5px 0">${title}</h3>
                        <div class="tech-tags">${tagsHTML}</div>
                        <p style="color:#cbd5e1; font-size:0.9rem; line-height:1.6">${desc}</p>
                        ${linkHTML}
                    </div>
                </div>`;
            }).join('');
            document.getElementById('gridView').innerHTML = gridHTML;

            // 2. Render Table
            // تحديث ترويسة الجدول
            const theadHTML = text.tableHeaders.map(h => `<th>${h}</th>`).join('');
            document.getElementById('tableHeader').innerHTML = theadHTML;

            const rowsHTML = projectsData.map(p => {
                const title = isArabic ? p.title_ar : p.title_en;
                const statusText = text.status[p.status] || p.status;
                const tags = p.tech.join(', ');
                const linkBtn = p.link ? 
                    `<a href="${p.link}" target="_blank" class="btn" style="padding:5px 10px; font-size:0.8em; width:fit-content">${text.viewBtn}</a>` : 
                    `<span style="opacity:0.5">${text.noLink}</span>`;

                return `
                <tr>
                    <td style="font-weight:bold; display:flex; align-items:center; gap:10px;">
                        <img src="${p.img}" style="width:40px; height:40px; border-radius:5px; object-fit:cover" onerror="this.src='logo.jpg'">
                        ${title}
                    </td>
                    <td>${p.date}</td>
                    <td><span style="color:${p.status === 'completed' ? '#10b981' : '#f59e0b'}">● ${statusText}</span></td>
                    <td style="color:#94a3b8">${tags}</td>
                    <td>${linkBtn}</td>
                </tr>`;
            }).join('');
            document.getElementById('tableBody').innerHTML = rowsHTML;
        }

        loadProjects();
    </script>
</body>
</html>
